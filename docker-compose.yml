services:
  mi50:
    image: mixa3607/vllm-gfx906:0.19.1-rocm-6.3.3-aiinfos
    ports:
      - "30024:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      NCCL_P2P_DISABLE: "1"
      HSA_OVERRIDE_GFX_VERSION: "9.0.6"
      HIP_VISIBLE_DEVICES: "0"
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"
    ipc: host
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        python3 -m vllm.entrypoints.openai.api_server
        --model QuantTrio/gemma-4-31B-it-AWQ
        --max-model-len 8192
        --dtype half
        --trust-remote-code
        --enforce-eager
        --max-num-seqs 4
        --quantization awq
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 600s

volumes:
  huggingface-cache:
