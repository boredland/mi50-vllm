services:
  vllm:
    image: lykaos/vllm-gfx:v0.11.2-rocm6.3
    ports:
      - "30024:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
      - HSA_OVERRIDE_GFX_VERSION=9.0.6
      - VLLM_USE_TRITON_FLASH_ATTN=1
      - NCCL_P2P_DISABLE=1
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
      - "992"  # render group GID
    ipc: host
    entrypoint: ["/bin/bash", "-c"]
    command:
      - >-
        python3 -m vllm.entrypoints.openai.api_server
        --model allenai/olmOCR-2-7B-1025
        --max-model-len 16384
        --dtype half
        --trust-remote-code
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  olmocr:
    build:
      context: .
      dockerfile: Dockerfile.olmocr
    volumes:
      - ./workspace:/workspace
      - ./input:/input
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    depends_on:
      vllm:
        condition: service_healthy
    entrypoint: ["/bin/bash"]
    # Default: process all PDFs in /input, output markdown to /workspace
    # Override with: docker compose run olmocr -c "olmocr /workspace --markdown --pdfs /input/*.pdf --server http://vllm:8000/v1"
    command:
      - -c
      - |
        echo "olmocr ready. vLLM server at http://vllm:8000/v1"
        echo "Usage: olmocr /workspace --markdown --pdfs /input/*.pdf --server http://vllm:8000/v1"
        exec bash

volumes:
  huggingface-cache:
